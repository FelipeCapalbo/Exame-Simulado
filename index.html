<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Simulador de Questões</title>
  <style>
    .selected { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
    .is-correct { border-color: #22c55e !important; background-color: #f0fdf4 !important; }
    .is-wrong { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div id="setupScreen" class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100">
    <h1 class="text-2xl font-black text-slate-800 mb-6 text-center uppercase tracking-tighter">Exame Simulado</h1>
    <div id="statusIndicator" class="mb-6 p-4 bg-blue-50 text-blue-700 rounded-2xl text-center text-sm font-bold">Carregando questões...</div>
    <div id="configSection" class="hidden fade-in space-y-4">
      <div class="bg-slate-100 p-4 rounded-2xl text-center">
        <span id="qCount" class="text-2xl font-black text-slate-700">0</span>
        <p class="text-xs font-bold text-slate-400 uppercase">Questões disponíveis</p>
      </div>
      <label class="block text-sm font-bold text-slate-500 ml-1">Quantidade de questões:</label>
      <input type="number" id="qtyInput" value="5" min="1" class="w-full p-4 border-2 border-slate-200 rounded-2xl outline-none focus:border-blue-500 font-bold text-center">
      <button onclick="startExam()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg transition-transform active:scale-95">GERAR EXAME</button>
    </div>
  </div>

  <div id="examScreen" class="hidden w-full max-w-2xl fade-in">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
      <div class="flex justify-between items-center mb-8 gap-4">
        <span id="progressLabel" class="text-xs font-black text-slate-400 uppercase tracking-widest">Questão 0/0</span>
        <div class="text-blue-600 font-bold bg-blue-50 px-4 py-1 rounded-full text-sm">Acertos: <span id="hits">0</span></div>
      </div>
      <h2 id="questionBody" class="text-xl text-slate-800 font-bold mb-8 leading-relaxed"></h2>
      <div id="optionsList" class="space-y-3"></div>
      <div class="mt-10 flex flex-col items-center">
        <button id="actionBtn" onclick="handleAction()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-md">CHECAR RESPOSTA</button>
        <div id="feedback" class="mt-4 font-bold text-lg min-h-[1.5rem]"></div>
      </div>
    </div>
  </div>

  <div id="resultScreen" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center fade-in">
      <h2 class="text-2xl font-black text-slate-800 mb-2">Simulado Finalizado!</h2>
      <p class="text-slate-500 mb-6">Você acertou <span id="finalScore" class="font-bold text-blue-600">0</span> de <span id="finalTotal">0</span> questões (<span id="finalPercent">0</span>%).</p>
      
      <div class="space-y-3">
        <button id="retryWrongBtn" onclick="retryWrongs()" class="hidden w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-xl font-bold transition-all shadow-md">REFAZER ERRADAS</button>
        <button onclick="location.reload()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-bold transition-all">PÁGINA INICIAL</button>
      </div>
    </div>
  </div>

  <script>
    let allQuestions = [];
    let examList = [];
    let wrongQuestions = []; // LISTA DE ERROS
    let currentPos = 0;
    let score = 0;
    let userSelections = new Set();
    let isValidated = false;

    // ... (Mantive suas funções loadDatabase, isValidQuestion e shuffleArray iguais) ...
    async function loadDatabase() {
      const statusIndicator = document.getElementById('statusIndicator');
      try {
        const response = await fetch('./questions.json');
        if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
        const data = await response.json();
        allQuestions = data.filter(isValidQuestion);
        document.getElementById('qCount').innerText = allQuestions.length;
        statusIndicator.classList.add('hidden');
        document.getElementById('configSection').classList.remove('hidden');
        document.getElementById('qtyInput').max = allQuestions.length;
      } catch (error) {
        statusIndicator.className = 'mb-6 p-4 bg-red-50 text-red-700 rounded-2xl text-center text-sm font-bold';
        statusIndicator.innerText = 'Erro ao carregar questions.json.';
      }
    }

    function isValidQuestion(question) {
      return (question && typeof question.text === 'string' && Array.isArray(question.options) && Array.isArray(question.corrects));
    }

    function shuffleArray(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function startExam() {
      const qty = Math.min(parseInt(document.getElementById('qtyInput').value) || 1, allQuestions.length);
      examList = shuffleArray(allQuestions).slice(0, qty);
      initSession();
    }

    function initSession() {
      currentPos = 0;
      score = 0;
      wrongQuestions = []; // Reseta erros no início de uma nova sessão
      document.getElementById('hits').innerText = score;
      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('examScreen').classList.remove('hidden');
      renderCurrent();
    }

    function renderCurrent() {
      isValidated = false;
      userSelections.clear();
      const q = examList[currentPos];
      document.getElementById('progressLabel').innerText = `Questão ${currentPos + 1}/${examList.length}`;
      document.getElementById('questionBody').innerText = q.text;
      document.getElementById('feedback').innerText = '';
      const actionBtn = document.getElementById('actionBtn');
      actionBtn.innerText = 'CHECAR RESPOSTA';
      actionBtn.className = 'w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-md';
      
      const optionsList = document.getElementById('optionsList');
      optionsList.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn w-full p-5 text-left border-2 border-slate-100 rounded-2xl transition-all flex items-center bg-white';
        btn.innerHTML = `<div class="check-box w-6 h-6 border-2 border-slate-200 rounded mr-4 flex items-center justify-center text-xs font-bold shrink-0"></div><span>${opt}</span>`;
        btn.onclick = () => toggleOption(i, btn);
        optionsList.appendChild(btn);
      });
    }

    function toggleOption(index, element) {
      if (isValidated) return;
      const box = element.querySelector('.check-box');
      if (userSelections.has(index)) {
        userSelections.delete(index);
        element.classList.remove('selected');
        box.className = 'check-box w-6 h-6 border-2 border-slate-200 rounded mr-4 flex items-center justify-center text-xs font-bold shrink-0';
        box.innerText = '';
      } else {
        userSelections.add(index);
        element.classList.add('selected');
        box.className = 'check-box w-6 h-6 border-2 border-blue-500 bg-blue-500 text-white rounded mr-4 flex items-center justify-center text-xs font-bold shrink-0';
        box.innerText = '✓';
      }
    }

    function handleAction() {
      if (!isValidated) validate();
      else nextQuestion();
    }

    function validate() {
      if (userSelections.size === 0) return alert('Selecione uma opção.');
      isValidated = true;
      const q = examList[currentPos];
      const userArr = Array.from(userSelections).sort();
      const correctArr = [...q.corrects].sort();
      const isCorrect = JSON.stringify(userArr) === JSON.stringify(correctArr);

      if (isCorrect) {
        score++;
        document.getElementById('hits').innerText = score;
      } else {
        wrongQuestions.push(q); // ADICIONA À LISTA DE ERROS
      }

      document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.disabled = true;
        const box = btn.querySelector('.check-box');
        if (q.corrects.includes(i)) {
          btn.classList.add('is-correct');
          box.className = 'check-box w-6 h-6 bg-green-500 text-white rounded mr-4 flex items-center justify-center text-xs font-bold shrink-0';
          box.innerText = '✓';
        } else if (userSelections.has(i)) {
          btn.classList.add('is-wrong');
          box.className = 'check-box w-6 h-6 bg-red-500 text-white rounded mr-4 flex items-center justify-center text-xs font-bold shrink-0';
          box.innerText = '✕';
        }
      });

      const feedback = document.getElementById('feedback');
      feedback.innerText = isCorrect ? 'Correto! ✨' : 'Errado ❌';
      feedback.className = `mt-4 font-bold text-lg min-h-[1.5rem] fade-in ${isCorrect ? 'text-green-600' : 'text-red-500'}`;
      
      const actionBtn = document.getElementById('actionBtn');
      actionBtn.innerText = currentPos === examList.length - 1 ? 'VER RESULTADO' : 'PRÓXIMA QUESTÃO';
      actionBtn.className = 'w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-md';
    }

    function nextQuestion() {
      currentPos++;
      if (currentPos < examList.length) renderCurrent();
      else showResult();
    }

    function showResult() {
      const total = examList.length;
      const percent = Math.round((score / total) * 100);
      document.getElementById('examScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');
      document.getElementById('finalScore').innerText = score;
      document.getElementById('finalTotal').innerText = total;
      document.getElementById('finalPercent').innerText = percent;
      
      const retryBtn = document.getElementById('retryWrongBtn');
      // Só mostra o botão de refazer se houver erros
      if (wrongQuestions.length > 0) {
        retryBtn.classList.remove('hidden');
        retryBtn.innerText = `REFAZER ERRADAS (${wrongQuestions.length})`;
      } else {
        retryBtn.classList.add('hidden');
      }
    }

    function retryWrongs() {
      examList = shuffleArray(wrongQuestions);
      initSession();
    }

    loadDatabase();
  </script>
</body>
</html>
